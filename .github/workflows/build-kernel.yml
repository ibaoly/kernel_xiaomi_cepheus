name: Build Kernel with Docker Support

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: k0d14k/kernel_xiaomi_cepheus
        ref: fifteen
        path: kernel

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          bc \
          flex \
          bison \
          libssl-dev \
          gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi \
          clang \
          lld \
          llvm

    - name: Add Docker/Container support to config
      run: |
        cd kernel
        
        # 先禁用 stack protector（和当前内核一致）
        sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/' arch/arm64/configs/cepheus_defconfig
        
        # 添加 Docker 相关配置
        cat >> arch/arm64/configs/cepheus_defconfig << 'CONFIGS'
        
        # Docker/container support
        CONFIG_PID_NS=y
        CONFIG_USER_NS=y
        CONFIG_CGROUP_PIDS=y
        CONFIG_CGROUP_DEVICE=y
        CONFIG_MEMCG=y
        CONFIG_MEMCG_SWAP=y
        CONFIG_MEMCG_SWAP_ENABLED=y
        CONFIG_BLK_CGROUP=y
        CONFIG_CGROUP_WRITEBACK=y
        CONFIG_CGROUP_SCHED=y
        CONFIG_CGROUP_FREEZER=y
        CONFIG_CPUSETS=y
        CONFIG_CGROUP_CPUACCT=y
        CONFIG_CGROUP_BPF=y
        CONFIG_NET_CLS_CGROUP=y
        CONFIG_CGROUP_NET_PRIO=y
        CONFIG_VETH=y
        CONFIG_BRIDGE=y
        CONFIG_BRIDGE_NETFILTER=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
        CONFIG_IP_VS=y
        CONFIG_IP_VS_NFCT=y
        CONFIG_IP_VS_RR=y
        CONFIG_NF_NAT=y
        CONFIG_NF_NAT_NEEDED=y
        CONFIG_POSIX_MQUEUE=y
        CONFIG_KEYS=y
        CONFIGS
        
        # 去重
        awk '!seen[$0]++' arch/arm64/configs/cepheus_defconfig > /tmp/defconfig
        mv /tmp/defconfig arch/arm64/configs/cepheus_defconfig

    - name: Build kernel
      run: |
        cd kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        
        make cepheus_defconfig
        make -j$(nproc)

    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: kernel-Image
        path: kernel/out/arch/arm64/boot/Image.gz-dtb
        retention-days: 30
